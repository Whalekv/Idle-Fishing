<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的鱼塘 - Happy Fishing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a3d62 url('pond.svg') center/cover no-repeat fixed;
      color: white;
      overflow-x: hidden;
    }
    .container {
      min-height: 100vh;
      padding: 20px;
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.25);
    }
    header {
      text-align: center;
      padding: 30px 20px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6);
    }
    .stats {
      font-size: 20px;
      opacity: 0.9;
    }
    .fish-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 10px;
    }
    .fish-card {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .fish-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .empty {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 28px;
        padding: 100px 20px;
        opacity: 0.8;
        line-height: 1.8;
        background: rgba(0,0,0,0.2);
        border-radius: 20px;
        margin: 40px 20px;
    }
    @media (max-width: 640px) {
      h1 { font-size: 32px; }
      .fish-grid { grid-template-columns: 1fr; }
    }
    .pond-layout {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
      aspect-ratio: 15 / 7; /* 可选：保持比例，避免太扁 */
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .fish-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* 不拦截鼠标事件 */
      z-index: 1;
    }

    .fish-list-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 360px;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 20px;
      overflow-y: auto;
      z-index: 2;
      border-right: 1px solid rgba(255,255,255,0.2);
    }

    .fish-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fish-list li {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .fish-list .fish-name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .fish-list .fish-weight { 
      font-size: 18px; margin: 6px 0; 
    }

    .rarity { 
      font-size: 20px; margin: 8px 0; letter-spacing: 3px; 
    }
    
    .timestamp, .fish-signature { 
      font-size: 13px; opacity: 0.7; margin-top: 8px; 
    }

    #emptyHint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      text-align: center;
      width: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* 隐藏滚动条美化（可选） */
    .fish-list-panel::-webkit-scrollbar {
      width: 8px;
    }
    .fish-list-panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }

    .btn-group button {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .contribute-btn {
      background: #ff5722 !important;
    }

    .contribute-btn:hover {
      background: #e64a19 !important;
    }

    .delete-btn {
      background: #f44336 !important;
    }

    .delete-btn:hover {
      background: #d32f2f !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左侧：鱼列表（可滚动） -->
    <div class="pond-layout">
      <div class="fish-list-panel">
        <!-- 标题和统计 -->
        <header>
          <h1>我的鱼塘</h1>
          <div class="stats">共捕获 <span id="total">0</span> 条鱼</div>
        </header>
        <ul id="fishList" class="fish-list"></ul>
        <div id="emptyHint" class="empty">还没有钓到鱼哦～快去钓鱼吧！</div>
      </div>

      <!-- 右侧：动画画布（覆盖背景） -->
      <canvas id="fishCanvas" class="fish-canvas"></canvas>
    </div>
  </div>

  <script src="fishpond.js"></script>
</body>
</html>
