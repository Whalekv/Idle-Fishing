<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Fishing</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="signature-container">
            <input class="signature-input" type="text" placeholder="请输入昵称">
            <input class="password-input" type="password" placeholder="请输入4位数密码" minlength="4" maxlength="4">
            <div class="signature-btn-container">
                <button class="signature-btn">确定签名</button>
                <button class="re-enter-btn">重新签名</button>
            </div>
        </div>

        <div class="fishing-container">
            <button class="start-fishing-btn">开始钓鱼</button>
            <button class="close-mini-win">结束钓鱼</button>
        </div>

        <div class="fishpond-container">
            <button id="openFishpond" class="open-fishpond-btn">查看鱼塘</button>
            <button id="openPublicFishpond" class="open-fishpond-btn">公共鱼池</button>
        </div>

        <div class="picture">图片区域</div>
    </div>
    <script src="popup.js" defer></script>
</body>
</html>
