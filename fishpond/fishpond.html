<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle">我的鱼塘 - Happy Fishing</title>
  <link rel="stylesheet" href="fishpond.css">
</head>
<body>
  <div class="container">
    <div class="pond-layout">
      <div class="fish-list-panel">
        <header>
          <h1 data-i18n="myFishpond">我的鱼塘</h1>
          <div class="stats" data-i18n="totalStats">共捕获 <span id="total">0</span> 条鱼</div>
        </header>
        <ul id="fishList" class="fish-list"></ul>
        <div id="emptyHint" class="empty" data-i18n="emptyHint">还没有钓到鱼哦～快去钓鱼吧！</div>
      </div>

      <canvas id="fishCanvas" class="fish-canvas"></canvas>
    </div>
  </div>

  <script src="fishpond.js"></script>
</body>
</html>
