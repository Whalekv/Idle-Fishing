<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公共鱼池</title>
  <Link rel="stylesheet" href="fishpond-public.css">
</head>
<body>
  <div class="container">
    <header>
        <h1>公共鱼池</h1>
        <div class="stats">共有 <span id="total">0</span> 条鱼</div>

    </div>
  </div>
  <script src="fishpond-public.js"></script>
